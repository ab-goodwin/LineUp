workflows:
  simulator-workflow:
    name: iOS Build (Capacitor)

    environment:
      xcode: latest
      node: 22

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build web app
        script: npm run build

      - name: Add Capacitor platform
        script: npx cap add ios || true

      - name: Sync Capacitor
        script: npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Build with workspace (IMPORTANT)
        script: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -sdk iphonesimulator \
            -configuration Debug \
            build

    artifacts:
      - ios/App/build/**/*.app
